name: Build and Push AWS Janitor Image

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'cmd/aws-janitor/**'
      - 'aws-janitor/**'
      - 'images/aws-janitor/**'
      - 'infra/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/build-aws-janitor.yaml'
  pull_request:
    paths:
      - 'cmd/aws-janitor/**'
      - 'aws-janitor/**'
      - 'images/aws-janitor/**'
      - 'infra/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/build-aws-janitor.yaml'
  workflow_dispatch:

env:
  GO_VERSION: "1.23.4"
  IMAGE_NAME: quay.io/ocp-splat/boskos

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Log in to Quay.io
        if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch' 
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ocp-splat+splat_team_push
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=v{{date 'YYYYMMDD'}}-{{sha}},enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./images/aws-janitor/Dockerfile
          platforms: linux/amd64
          push: ${{ github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            go_version=${{ env.GO_VERSION }}
            cmd=aws-janitor
            DOCKER_TAG=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image build summary
        run: |
          echo "### 🛠️ Build Verification" >> $GITHUB_STEP_SUMMARY
          echo "The Docker image was successfully compiled and verified." >> $GITHUB_STEP_SUMMARY
          echo "- **Context**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch/Ref**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY

      - name: Image push summary
        if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
        run: |
          echo "### 🚀 Registry Deployment" >> $GITHUB_STEP_SUMMARY
          echo "The image was pushed to Quay.io." >> $GITHUB_STEP_SUMMARY
          echo "- **Primary Tag**: \`${{ steps.meta.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **All Tags**:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Digest**: \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY